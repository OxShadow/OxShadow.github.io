# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: OxShadow
subtitle: '为漏洞而生'
description: '普通网安练习生 | 漏洞挖掘 | Web安全'
keywords:  渗透测试, Web安全
author: ss
language: zh-CN
timezone: Asia/Shanghai

# URL - 重要：改成你的实际 GitHub Pages 地址
url: https://oxshadow.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true  # 建议开启，方便管理文章资源
relative_link: false
future: true
highlight:
  line_number: true
  auto_detect: true
  tab_replace: ''
  wrap: true
  hljs: false

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: fluid  # ← 关键：切换为 fluid 主题

# Live2D 看板娘配置（hexo-helper-live2d 插件）
live2d:
  enable: true
  scriptFrom: local
  pluginRootPath: live2d/
  pluginJsPath: lib/
  pluginModelPath: assets/
  tagMode: false
  debug: false
  model:
    use: live2d-widget-model-hijiki  # 可替换为 shizuku/tororo/haruto
  display:
    position: right
    width: 150
    height: 300
    hOffset: 80
    vOffset: -20
  mobile:
    show: true
    scale: 0.8
  react:
    opacity: 0.7

# Deployment - 适配 gh-pages 分支
deploy:
  type: git
  repo: https://github.com/OxShadow/OxShadow.github.io.git
  branch: gh-pages